{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card shadow-sm auth-card">
            <div class="card-body p-4">
                <h1 class="h4 mb-1">Set New Password</h1>
                <p class="text-muted small mb-4">
                    Create a new password for <strong>{{ email }}</strong>.
                </p>

                <form method="post" action="{{ url_for('set_new_password') }}">
                    <input type="hidden" name="email" value="{{ email }}">
                    <div class="mb-3">
                        <label class="form-label" for="new_password">New Password</label>
                        <input class="form-control" type="password" id="new_password" name="new_password" minlength="8" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="confirm_password">Confirm Password</label>
                        <input class="form-control" type="password" id="confirm_password" name="confirm_password" minlength="8" required>
                    </div>
                    <button type="submit" class="btn btn-neon-primary w-100">Save New Password</button>
                </form>

                <div class="text-center small mt-3">
                    <a href="{{ url_for('password_reset_status', email=email) }}" class="link-light">Back to Request Status</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
