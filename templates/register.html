{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-sm auth-card">
            <div class="card-body p-4">
                <h1 class="h4 mb-1">Register</h1>
                <p class="text-muted small mb-4">Create a free account to view details and save results.</p>

                <form method="post" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label" for="full_name">Name</label>
                        <input
                            class="form-control"
                            type="text"
                            id="full_name"
                            name="full_name"
                            value="{{ form_data.get('full_name', '') if form_data else '' }}"
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input
                            class="form-control"
                            type="email"
                            id="email"
                            name="email"
                            value="{{ form_data.get('email', '') if form_data else '' }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" type="password" id="password" name="password" minlength="6" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="confirm_password">Confirm Password</label>
                        <input class="form-control" type="password" id="confirm_password" name="confirm_password" minlength="6" required>
                    </div>

                    <button type="submit" class="btn btn-neon-primary w-100">Create Account</button>
                </form>

                <div class="text-center small mt-3">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="link-light">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
