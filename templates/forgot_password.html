{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card shadow-sm auth-card">
            <div class="card-body p-4">
                <h1 class="h4 mb-1">Forgot Password</h1>
                <p class="text-muted small mb-4">
                    Submit a password reset request for admin review.
                </p>

                <form method="post" action="{{ url_for('forgot_password') }}">
                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input
                            class="form-control"
                            type="email"
                            id="email"
                            name="email"
                            value="{{ form_data.get('email', '') if form_data else '' }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="reason">Reason (Optional)</label>
                        <textarea
                            class="form-control"
                            id="reason"
                            name="reason"
                            rows="4"
                            placeholder="Example: I forgot my password and cannot access my account."
                        >{{ form_data.get('reason', '') if form_data else '' }}</textarea>
                    </div>

                    <button type="submit" class="btn btn-neon-primary w-100">Submit Request</button>
                </form>

                <div class="text-center small mt-3">
                    <a href="{{ url_for('password_reset_status') }}" class="link-light">Check Request Status</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
